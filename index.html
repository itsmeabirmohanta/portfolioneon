<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Viewport & Device Compatibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    
    <!-- Apple Device Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Abir Mohanta" />
    <meta name="apple-itunes-app" content="app-id=999999999" />
    
    <!-- Apple Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-152.png" sizes="152x152" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-144.png" sizes="144x144" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-120.png" sizes="120x120" />
    
    <!-- Windows & Standard Icons -->
    <link rel="icon" type="image/x-icon" href="/AM-logo-Black.ico" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/x-icon" href="/AM-logo-White.ico" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="/AM-logo-Black.ico" />
    <link rel="shortcut icon" href="/AM-logo-Black.ico" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Windows Tile -->
    <meta name="msapplication-TileColor" content="#1a1a1a" />
    <meta name="msapplication-TileImage" content="/mstile-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Abir Mohanta" />
    
    <!-- Format Detection -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="address=no" />
    
    <!-- Additional Device Support -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    
    <!-- Page Information -->
    <title>Abir Mohanta | Portfolio</title>
    <meta name="description" content="Portfolio of Abir Mohanta — Developer & Designer" />
    <meta name="author" content="Abir Mohanta" />
    <meta name="keywords" content="portfolio, design, development" />

    <!-- Open Graph -->
    <meta property="og:title" content="Abir Mohanta | Portfolio" />
    <meta property="og:description" content="Portfolio of Abir Mohanta — Developer & Designer" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abir Mohanta | Portfolio" />
    <meta name="twitter:description" content="Portfolio of Abir Mohanta — Developer & Designer" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
